on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - 'eks-infra-iac/'

permissions:
  contents: write
  security-events: write
  id-token: write

env:
  IMAGE_NAME: hamoud07/nodejs-app

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source="${{ github.workspace }}" \
            --report-format=json \
            --report-path="gitleaks-report.json" \
            --redact \
            --exit-code 0

      - uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  checkov-terraform:
    name: Checkov Terraform Scan
    runs-on: self-hosted
    needs: gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - run: checkov --version
      - run: |
          checkov -d . \
          --framework terraform \
          --output json > checkov-terraform-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: checkov-terraform-report
          path: checkov-terraform-report.json

  checkov-k8s:
    name: Checkov Kubernetes Scan
    runs-on: self-hosted
    needs: gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - run: checkov --version
      - run: |
          checkov -d . \
          --framework kubernetes \
          --output json > checkov-k8s-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: checkov-k8s-report
          path: checkov-k8s-report.json

  checkov-dockerfile:
    name: Checkov Dockerfile Scan
    runs-on: self-hosted
    needs: gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - run: checkov --version
      - run: |
          checkov -d . \
          --framework dockerfile \
          --output json > checkov-dockerfile-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: checkov-dockerfile-report
          path: checkov-dockerfile-report.json

  client-trivy-fs:
    name: Client Trivy FS Scan
    runs-on: self-hosted
    needs: gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - run: trivy --version
      - run: |
          trivy fs ./client \
          --format json \
          --output client-trivy-fs-report.json \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0
      - run: |
          trivy fs ./client \
          --format table \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0 > client-trivy-fs-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: client-trivy-fs-json-report
          path: client-trivy-fs-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: client-trivy-fs-table-report
          path: client-trivy-fs-report.txt

  server-trivy-fs:
    name: Server Trivy FS Scan
    runs-on: self-hosted
    needs: gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - run: trivy --version
      - run: |
          trivy fs ./server \
          --format json \
          --output server-trivy-fs-report.json \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0
      - run: |
          trivy fs ./server \
          --format table \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0 > server-trivy-fs-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: server-trivy-fs-json-report
          path: server-trivy-fs-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: server-trivy-fs-table-report
          path: server-trivy-fs-report.txt

  client-lint:
    runs-on: self-hosted
    needs: [client-trivy-fs, checkov-k8s, checkov-dockerfile, checkov-terraform]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
        continue-on-error: true

  server-lint:
    runs-on: self-hosted
    needs: [server-trivy-fs, checkov-k8s, checkov-dockerfile, checkov-terraform]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
        continue-on-error: true

  client-test:
    runs-on: self-hosted
    needs: client-lint
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm test --if-present
        continue-on-error: true

  server-test:
    runs-on: self-hosted
    needs: server-lint
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm test --if-present
        continue-on-error: true

  client-build:
    runs-on: self-hosted
    needs: client-test
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run build --if-present

  docker-build:
    runs-on: self-hosted
    needs: [client-build, server-test]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - run: docker build -t "${{ steps.meta.outputs.full_image }}" .

  image-trivy-scan:
    runs-on: self-hosted
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t "${{ needs.docker-build.outputs.full_image }}" .
      - run: trivy image "${{ needs.docker-build.outputs.full_image }}"

  docker-push:
    runs-on: self-hosted
    needs: image-trivy-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.docker-build.outputs.full_image }}

  update-k8s-manifest:
    runs-on: self-hosted
    needs: docker-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: |
          sed -i "s|\(hamoud07/nodejs-app:\).*|\1${GITHUB_SHA}|g" k8s-manifests/app-deployment.yaml
      - run: |
          git config user.name "hamoud31"
          git config user.email "hamoudblal@gmail.com"
          git add .
          git commit -m "update image"
          git push
